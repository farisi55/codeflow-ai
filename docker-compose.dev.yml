name: codeflow-ai-dev

services:
  web:
    image: node:22-alpine
    working_dir: /workspace
    command: corepack pnpm --filter @codeflow/web dev --hostname 0.0.0.0
    env_file:
      - path: .env.local
        required: false
      - path: apps/api/.env
        required: false
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - .:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
      - root-node-modules:/workspace/node_modules
    depends_on:
      api:
        condition: service_started

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && corepack pnpm install --no-frozen-lockfile && corepack pnpm --filter @codeflow/api dev"
    env_file:
      - path: .env.local
        required: false
      - path: apps/api/.env
        required: false
    environment:
      NODE_ENV: development
      APP_PORT: 4000
      TERMINAL_ENABLED: ${TERMINAL_ENABLED:-true}
      TERMINAL_ALLOW_REMOTE: ${TERMINAL_ALLOW_REMOTE:-false}
      PREVIEW_ENABLED: ${PREVIEW_ENABLED:-true}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    ports:
      - "${APP_PORT:-4000}:4000"
      - "9229:9229"
    volumes:
      - .:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
      - root-node-modules:/workspace/node_modules

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-dev-data:/root/.ollama

volumes:
  pnpm-store:
  root-node-modules:
  ollama-dev-data:
