name: codeflow-ai

x-proxy-env: &proxy-env
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}
  http_proxy: ${HTTP_PROXY:-}
  https_proxy: ${HTTPS_PROXY:-}
  no_proxy: ${NO_PROXY:-}

x-dns: &dns-servers
  - ${DOCKER_DNS_1:-1.1.1.1}
  - ${DOCKER_DNS_2:-8.8.8.8}

x-proxy-build-args: &proxy-build-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        <<: *proxy-build-args
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    environment:
      <<: *proxy-env
      NODE_ENV: production
      # The client bundle already contains the build arg above. Changing this
      # value requires rebuilding the web image, not only restarting it.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    dns: *dns-servers
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        <<: *proxy-build-args
    env_file:
      - path: .env
        required: false
      - path: apps/api/.env
        required: false
    environment:
      <<: *proxy-env
      NODE_ENV: production
      APP_PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:4000}




      TERMINAL_ENABLED: ${TERMINAL_ENABLED:-true}
      TERMINAL_ALLOW_REMOTE: ${TERMINAL_ALLOW_REMOTE:-}
      PREVIEW_ENABLED: ${PREVIEW_ENABLED:-true}
      PREVIEW_ALLOW_REMOTE: ${PREVIEW_ALLOW_REMOTE:-}
      PREVIEW_READY_TIMEOUT_MS: ${PREVIEW_READY_TIMEOUT_MS:-30000}
    ports:
      - "${APP_PORT:-4000}:4000"
    volumes:
      # In the UI, use /workspace/projects/<project-folder>.
      - ${PROJECTS_DIR:-./projects}:/workspace/projects
    dns: *dns-servers
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:4000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    dns: *dns-servers
    restart: unless-stopped

volumes:
  ollama-data:
